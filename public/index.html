<!DOCTYPE html>
<html lang="en" class="dark h-full">
<head>
  <meta charset="UTF-8">
  <title>CodeFromHere</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/css/ide.css">
  <link rel="stylesheet" href="/css/hyper-theme.css">
</head>

<body class="h-full overflow-hidden" style="background:rgba(0,0,0,0.92)" x-data="ideApp()" x-init="init()">

  <!-- HYPER-STYLE TITLE BAR -->
  <div class="title-bar">
    <!-- Tabs: unified tab bar for terminals and editor files -->
    <div class="hyper-tabs">
      <!-- Terminal tabs -->
      <template x-for="tab in terminalTabs" :key="tab.id">
        <div class="hyper-tab"
             :class="{ 'active': activeView === 'terminal' && activeTerminalTab === tab.id }"
             @click="activateTerminalTab(tab.id); activeView = 'terminal'">
          <span class="tab-icon" x-text="tab.isLocal ? '&#x25B6;' : '&#x1F5A5;'"></span>
          <span class="tab-label" x-text="tab.label"></span>
          <button class="tab-close" @click.stop="closeTerminalTab(tab.id)">&times;</button>
        </div>
      </template>

      <!-- Editor tabs -->
      <template x-for="tab in editorTabs" :key="tab.id">
        <div class="hyper-tab"
             :class="{ 'active': activeView === 'editor' && activeEditorTab === tab.id }"
             @click="activateEditorTab(tab.id); activeView = 'editor'">
          <span class="tab-icon" x-text="getFileIcon(tab)"></span>
          <span class="tab-label" x-text="tab.label"></span>
          <span x-show="tab.dirty" class="tab-dirty">&#x25CF;</span>
          <button class="tab-close" @click.stop="closeEditorTab(tab.id)">&times;</button>
        </div>
      </template>
    </div>

    <!-- Tab bar actions -->
    <div class="tab-actions">
      <!-- New terminal dropdown -->
      <div class="relative" x-data="{ showNew: false }" @click.outside="showNew = false">
        <button class="tab-action-btn" @click="showNew = !showNew" title="New terminal">+</button>
        <div x-show="showNew" x-transition
             class="absolute right-0 top-full mt-1 bg-gray-900 border border-gray-700 rounded-lg shadow-xl z-50 py-1 min-w-44">
          <button @click="openLocalTerminal(); showNew=false"
                  class="block w-full text-left px-3 py-1.5 text-xs text-gray-300 hover:bg-gray-800">
            &#x25B6; Local Terminal
          </button>
          <div class="border-t border-gray-800 my-1"></div>
          <template x-for="conn in connections.filter(c => c.type === 'sftp')" :key="conn.id">
            <button @click="openSSHTerminalFor(conn.id); showNew=false"
                    class="block w-full text-left px-3 py-1.5 text-xs text-gray-300 hover:bg-gray-800">
              &#x1F5A5; <span x-text="conn.name"></span>
            </button>
          </template>
        </div>
      </div>

      <!-- Transfer bell -->
      <div class="relative" @click.outside="transferPanelOpen = false">
        <button @click="transferPanelOpen = !transferPanelOpen" class="tab-action-btn relative" title="Transfers">
          &#x1F514;
          <span x-show="activeTransferCount > 0" class="bell-badge" x-text="activeTransferCount"></span>
        </button>
        <div x-show="transferPanelOpen" x-transition
             class="absolute right-0 top-full mt-1 w-96 max-h-80 overflow-y-auto bg-gray-900 border border-gray-700 rounded-lg shadow-xl z-50">
          <div class="flex items-center justify-between px-3 py-2 border-b border-gray-800">
            <span class="text-[10px] font-semibold text-gray-500 uppercase">Transfers</span>
            <button @click="clearCompletedTransfers()" class="text-[10px] text-gray-600 hover:text-gray-300">Clear</button>
          </div>
          <template x-if="transfers.length === 0">
            <div class="p-4 text-center text-xs text-gray-600">No transfers</div>
          </template>
          <template x-for="t in transfers" :key="t.id">
            <div class="px-3 py-2 border-b border-gray-800/50 text-xs">
              <div class="flex items-center gap-2">
                <span x-show="t.status === 'active'" class="animate-spin text-purple-400">&#x21BB;</span>
                <span x-show="t.status === 'success'" class="text-green-400">&#x2714;</span>
                <span x-show="t.status === 'error'" class="text-red-400">&#x2718;</span>
                <span class="font-medium truncate" x-text="t.sourceName"></span>
              </div>
              <div x-show="t.endTime" class="text-[10px] text-gray-600 mt-0.5" x-text="((t.endTime - t.startTime) / 1000).toFixed(1) + 's'"></div>
              <div x-show="t.error" class="text-[10px] text-red-400 mt-0.5" x-text="t.error"></div>
            </div>
          </template>
        </div>
      </div>

      <!-- Sidebar toggle -->
      <button @click="toggleSidebar()" class="tab-action-btn" title="Toggle sidebar (Cmd+B)">&#x29C9;</button>

      <!-- Settings -->
      <button @click="window.location.href='/connections.html'" class="tab-action-btn" title="Settings">&#x2699;</button>
    </div>
  </div>

  <!-- MAIN LAYOUT -->
  <div class="flex" style="height: calc(100vh - 38px)">

    <!-- SIDEBAR -->
    <aside x-show="sidebarVisible"
           x-transition
           :style="`width:${sidebarWidth}px;min-width:180px;max-width:500px`"
           class="flex flex-col flex-shrink-0 relative select-none sidebar-hyper">

      <!-- Toolbar -->
      <div class="flex items-center gap-1 px-2 py-2 border-b border-gray-800/50 flex-shrink-0">
        <span class="text-[10px] text-gray-600 font-semibold uppercase tracking-widest">Connections</span>
        <div class="flex-1"></div>
        <button @click="newFile()" class="tab-action-btn" style="width:20px;height:20px;font-size:12px" title="New file">+</button>
        <button @click="newFolder()" class="tab-action-btn" style="width:20px;height:20px;font-size:11px" title="New folder">&#x1F4C1;</button>
        <button @click="showHidden = !showHidden"
                :class="showHidden ? 'text-purple-400' : ''"
                class="tab-action-btn" style="width:20px;height:20px;font-size:9px" title="Show hidden">.h</button>
      </div>

      <!-- Search -->
      <div class="px-2 py-1 flex-shrink-0">
        <input x-model="searchQuery" placeholder="Search files..."
               class="w-full bg-black/30 text-[11px] rounded px-2 py-1 border border-gray-800 focus:outline-none focus:border-purple-500/50 text-gray-400 placeholder-gray-700">
      </div>

      <!-- Tree -->
      <div class="flex-1 overflow-y-auto">
        <template x-if="connections.length === 0">
          <div class="p-4 text-gray-600 text-xs text-center">
            <p>No connections</p>
            <a href="/connections.html" class="text-purple-400 hover:underline">Add one</a>
          </div>
        </template>

        <template x-for="row in flatVisibleTree" :key="row.key">
          <div class="flex items-center gap-1 pr-2 py-0.5 text-[11px] hover:bg-white/[0.03] cursor-pointer group select-none"
               :style="`padding-left:${row.depth * 14 + 6}px`"
               :class="{
                 'bg-white/[0.05]': selectedNodeKey === row.key,
                 'text-gray-300 font-medium': row.item.isRoot,
                 'text-blue-400/70': row.item.isDir && !row.item.isRoot,
                 'text-gray-500': !row.item.isDir && !row.item.isRoot,
                 'opacity-50 italic': clipboard?.mode === 'cut' && clipboard?.connectionId === row.item.connectionId && clipboard?.path === row.item.path,
               }"
               @click="onTreeNodeClick(row)"
               @contextmenu.prevent="showTreeContextMenu($event, row)">

            <span x-show="row.item.isDir || row.item.isRoot"
                  class="w-3.5 text-center flex-shrink-0 text-gray-600 text-[9px]"
                  @click.stop="toggleNode(row.key)">
              <span x-show="row.node?.loading" class="animate-spin inline-block">&#x21BB;</span>
              <span x-show="!row.node?.loading" x-text="row.node?.expanded ? '&#x25BE;' : '&#x25B8;'"></span>
            </span>
            <span x-show="!row.item.isDir && !row.item.isRoot" class="w-3.5 flex-shrink-0"></span>

            <span x-show="row.item.isRoot" class="w-1.5 h-1.5 rounded-full flex-shrink-0" :style="`background:${row.item.color}`"></span>
            <span class="flex-shrink-0 text-[11px]" x-text="getTreeIcon(row.item)"></span>

            <template x-if="renamingKey !== row.key">
              <span class="truncate flex-1" x-text="row.item.name"></span>
            </template>
            <template x-if="renamingKey === row.key">
              <input data-rename-input x-model="renameValue"
                     @keydown.enter="confirmRename(row.key)" @keydown.escape="renamingKey = null" @click.stop
                     class="flex-1 bg-black/50 text-[11px] px-1 rounded border border-purple-500/50 outline-none text-gray-300">
            </template>

            <span x-show="row.item.isRoot && row.item.host" class="text-[9px] text-gray-700 truncate ml-1" x-text="row.item.host"></span>
            <span x-show="!row.item.isDir && !row.item.isRoot"
                  class="text-[9px] text-gray-700 opacity-0 group-hover:opacity-100 flex-shrink-0 ml-1"
                  x-text="formatSize(row.item.size)"></span>
          </div>
        </template>
      </div>

      <!-- Sidebar resize handle -->
      <div class="absolute right-0 top-0 bottom-0 w-1 cursor-col-resize hover:bg-purple-500/50 opacity-0 hover:opacity-100 transition-opacity"
           @mousedown.prevent="startSidebarResize($event)"></div>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <div class="flex flex-col flex-1 overflow-hidden">

      <!-- EDITOR (shown when activeView === 'editor') -->
      <div class="flex-1 relative overflow-hidden" x-show="activeView === 'editor'">
        <div id="monaco-editor" style="position:absolute;top:0;left:0;right:0;bottom:0"></div>
        <div x-show="editorTabs.length === 0 && activeView === 'editor'"
             class="absolute inset-0 flex flex-col items-center justify-center text-gray-700 select-none" style="z-index:50;background:rgba(0,0,0,0.85)">
          <div class="text-5xl mb-3 opacity-15">&#x2B21;</div>
          <p class="text-xs text-gray-600">CodeFromHere</p>
          <p class="text-[10px] text-gray-700 mt-1">Open a file from the sidebar</p>
        </div>
      </div>

      <!-- TERMINAL AREA (shown when activeView === 'terminal') -->
      <div class="flex-1 relative overflow-hidden" x-show="activeView === 'terminal'">
        <!-- Terminal containers -->
        <template x-for="tab in terminalTabs" :key="tab.id">
          <div :id="`terminal-${tab.id}`"
               x-show="activeTerminalTab === tab.id"
               class="absolute inset-0"
               style="padding: 4px 4px 0 4px"></div>
        </template>

        <!-- Empty state -->
        <div x-show="terminalTabs.length === 0 && activeView === 'terminal'"
             class="absolute inset-0 flex flex-col items-center justify-center text-gray-700 select-none">
          <div class="text-5xl mb-3 opacity-15">&#x2328;</div>
          <p class="text-xs text-gray-600">No terminals open</p>
          <p class="text-[10px] text-gray-700 mt-1">Press Cmd+T for local, or click + above</p>
        </div>
      </div>
    </div>
  </div>

  <!-- CONTEXT MENU -->
  <div x-show="ctxMenu.visible"
       x-transition:enter="transition-all duration-75"
       x-transition:enter-start="opacity-0 scale-95"
       x-transition:enter-end="opacity-100 scale-100"
       :style="`position:fixed;top:${ctxMenu.y}px;left:${ctxMenu.x}px;z-index:1000`"
       @click.outside="ctxMenu.visible = false"
       class="bg-gray-900 border border-gray-700 rounded-lg shadow-2xl py-1 min-w-48 text-[12px]">

    <template x-if="ctxMenu.item && !ctxMenu.item.isDir && !ctxMenu.item.isRoot">
      <button @click="openFileFromTree(ctxMenu.nodeKey); ctxMenu.visible=false" class="ctx-item">Open in editor</button>
    </template>
    <template x-if="ctxMenu.item">
      <button @click="openTerminalForNode(ctxMenu.nodeKey); ctxMenu.visible=false" class="ctx-item">Open terminal here</button>
    </template>

    <div class="border-t border-gray-800 my-1"></div>

    <template x-if="ctxMenu.item?.isDir || ctxMenu.item?.isRoot">
      <button @click="triggerUpload(ctxMenu.nodeKey); ctxMenu.visible=false" class="ctx-item">Upload files</button>
    </template>
    <template x-if="ctxMenu.item && !ctxMenu.item.isDir && !ctxMenu.item.isRoot">
      <button @click="downloadTreeItem(ctxMenu.nodeKey); ctxMenu.visible=false" class="ctx-item">Download</button>
    </template>

    <template x-if="ctxMenu.item && !ctxMenu.item.isRoot">
      <button @click="clipboardCopy(ctxMenu.nodeKey); ctxMenu.visible=false" class="ctx-item">Copy</button>
    </template>
    <template x-if="ctxMenu.item && !ctxMenu.item.isRoot">
      <button @click="clipboardCut(ctxMenu.nodeKey); ctxMenu.visible=false" class="ctx-item">Cut</button>
    </template>
    <template x-if="(ctxMenu.item?.isDir || ctxMenu.item?.isRoot) && clipboard">
      <button @click="clipboardPaste(ctxMenu.nodeKey); ctxMenu.visible=false" class="ctx-item text-purple-400">
        Paste <span class="text-gray-600" x-text="'(' + clipboard?.name + ')'"></span>
      </button>
    </template>

    <div class="border-t border-gray-800 my-1"></div>

    <button @click="createNewFileAt(ctxMenu.nodeKey); ctxMenu.visible=false" class="ctx-item">New file</button>
    <template x-if="ctxMenu.item?.isDir || ctxMenu.item?.isRoot">
      <button @click="createNewFolderAt(ctxMenu.nodeKey); ctxMenu.visible=false" class="ctx-item">New folder</button>
    </template>
    <template x-if="ctxMenu.item?.isDir || ctxMenu.item?.isRoot">
      <button @click="refreshNode(ctxMenu.nodeKey); ctxMenu.visible=false" class="ctx-item">Refresh</button>
    </template>
    <template x-if="ctxMenu.item && !ctxMenu.item.isRoot">
      <button @click="startRename(ctxMenu.nodeKey); ctxMenu.visible=false" class="ctx-item">Rename</button>
    </template>

    <div class="border-t border-gray-800 my-1"></div>

    <template x-if="ctxMenu.item && !ctxMenu.item.isRoot">
      <button @click="confirmDelete(ctxMenu.nodeKey); ctxMenu.visible=false" class="ctx-item text-red-400/70">Delete</button>
    </template>
  </div>

  <!-- MODAL -->
  <div x-show="modal.visible" x-transition class="fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-gray-900 rounded-xl border border-gray-700 shadow-2xl p-6 w-full max-w-md" @click.outside="modal.visible=false">
      <h3 class="font-semibold text-lg mb-4" x-text="modal.title"></h3>
      <div x-html="modal.body"></div>
      <div class="flex gap-2 mt-4 justify-end">
        <button @click="modal.visible=false" class="px-3 py-1 bg-gray-800 rounded text-sm hover:bg-gray-700">Cancel</button>
        <button @click="modal.confirm?.()" class="px-3 py-1 bg-purple-600 rounded text-sm hover:bg-purple-500">Confirm</button>
      </div>
    </div>
  </div>

  <!-- NOTIFICATIONS -->
  <div class="fixed bottom-4 right-4 flex flex-col gap-2 z-50 pointer-events-none">
    <template x-for="n in notifications" :key="n.id">
      <div x-transition class="flex items-center gap-2 px-4 py-2 rounded-lg shadow-lg text-xs pointer-events-auto"
           :class="{
             'bg-green-900/80 text-green-200': n.type === 'success',
             'bg-red-900/80 text-red-200': n.type === 'error',
             'bg-gray-800/80 text-gray-300': n.type === 'info',
           }">
        <span x-text="n.message"></span>
      </div>
    </template>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/editor.js"></script>
  <script src="/js/terminal.js"></script>
  <script src="/js/fileTree.js"></script>
  <script src="/js/contextMenu.js"></script>
  <script src="/js/app.js"></script>
  <script>
    // Detect Electron and add class to body
    if (window.electronAPI?.isElectron) document.body.classList.add('is-electron')
  </script>
</body>
</html>
